<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #cbbba0, #bfa58a);
            font-family: Arial, sans-serif;
        }

        #login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 320px;
            padding: 40px;
            background: linear-gradient(180deg, #f7ead9, #ead7bd);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #login h1 {
            text-align: center;
            margin-bottom: 15px;
            color: #5e4632;
        }

        #login label {
            color: #5e4632;
            font-weight: bold;
        }

        #login input {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        #login input[type="submit"] {
            margin-top: 10px;
            background-color: #8a6748;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        #login input[type="submit"]:hover {
            background-color: #6f5239;
        }
        #login a {
        text-decoration: none;
        color: #7a5c43;
        font-size: 14px;
        transition: all 0.2s ease;
        text-align: center;
        }
        #login a:hover {
            color: #5e4632;
            transform: scale(1.08);
        }

    </style>
</head>

<body>

<form id="login" action="valida" method="POST">

    <h1>Login</h1>

    <label>Username</label>
    <input type="text" name="username" id="username">

    <label>Password</label>
    <input type="password" name="password" id="password">

    <input type="submit" value="Entrar">

    <a href="simulation.jsp">Ou simulação de taxa de juros</a>

</form>

</body>
</html>
